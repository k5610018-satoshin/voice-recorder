<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="振り返り録音">
<meta name="theme-color" content="#e74c3c">
<title>振り返り録音</title>

<!-- PWA Manifest (set dynamically with PNG icons) -->
<link rel="manifest" id="manifestLink">

<!-- Apple Touch Icon (set dynamically as PNG) -->
<link rel="apple-touch-icon" id="appleTouchIcon">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f5f7fa;
  color: #2c3e50;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* ---- Header ---- */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 400px;
  padding: 16px 0 4px;
  position: relative;
  flex-shrink: 0;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: #2c3e50;
  letter-spacing: 0.5px;
}

.settings-btn {
  position: absolute;
  right: 0;
  top: 12px;
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(0,0,0,0.05);
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.date-display {
  font-size: 14px;
  color: #7f8c8d;
  text-align: center;
  margin-bottom: 12px;
  flex-shrink: 0;
}

/* ---- Waveform Canvas ---- */
.waveform-area {
  width: 100%;
  max-width: 400px;
  flex-shrink: 0;
  padding: 0 4px;
}

.waveform-canvas {
  width: 100%;
  height: 100px;
  border-radius: 12px;
  background: #fff;
  display: block;
  touch-action: none;
}

/* ---- Time display ---- */
.time-display {
  text-align: center;
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  color: #2c3e50;
  padding: 8px 0 4px;
  flex-shrink: 0;
  min-height: 32px;
}

.time-display .current-time {
  font-weight: 600;
}

.time-display .total-time {
  color: #95a5a6;
}

/* ---- Controls ---- */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 12px 0;
  flex-shrink: 0;
  flex-wrap: wrap;
  width: 100%;
  max-width: 400px;
}

.btn-action {
  height: 48px;
  padding: 0 20px;
  border: none;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
}

.btn-action:active {
  transform: scale(0.95);
}

.btn-action:disabled {
  opacity: 0.35;
  cursor: default;
  transform: none;
}

/* Record button (large red circle) */
.btn-record {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #e74c3c;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(231,76,60,0.35);
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, box-shadow 0.3s;
  flex-shrink: 0;
}

.btn-record:active {
  transform: scale(0.93);
}

.btn-record .inner {
  width: 28px;
  height: 28px;
  background: #fff;
  border-radius: 50%;
  transition: border-radius 0.2s, width 0.2s, height 0.2s;
}

.btn-record.recording .inner {
  width: 22px;
  height: 22px;
  border-radius: 4px;
}

.btn-record.pulse {
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(231,76,60,0.35); }
  50% { box-shadow: 0 4px 40px rgba(231,76,60,0.65); }
}

/* Pause button */
.btn-pause {
  background: #f39c12;
  color: #fff;
  box-shadow: 0 2px 10px rgba(243,156,18,0.25);
}

/* Play button */
.btn-play {
  background: #3498db;
  color: #fff;
  box-shadow: 0 2px 10px rgba(52,152,219,0.25);
}

/* Overwrite record button */
.btn-overwrite {
  background: #e74c3c;
  color: #fff;
  box-shadow: 0 2px 10px rgba(231,76,60,0.25);
}

/* Done/finish button */
.btn-done {
  background: #27ae60;
  color: #fff;
  box-shadow: 0 2px 10px rgba(39,174,96,0.25);
}

/* Retake button */
.btn-retake {
  background: none;
  color: #e74c3c;
  font-size: 14px;
  height: 40px;
  padding: 0 16px;
  width: 100%;
}

/* Idle start button */
.btn-start-record {
  width: 100%;
  max-width: 280px;
  height: 56px;
  border: none;
  border-radius: 28px;
  background: #e74c3c;
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(231,76,60,0.35);
  transition: transform 0.12s;
}

.btn-start-record:active {
  transform: scale(0.96);
}

.hidden { display: none !important; }

/* Background pause notification banner */
.bg-pause-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: #f39c12;
  color: #fff;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 16px;
  padding-top: calc(10px + env(safe-area-inset-top));
  transform: translateY(-100%);
  transition: transform 0.3s ease;
}

.bg-pause-banner.show {
  transform: translateY(0);
}

/* ---- Status ---- */
.status-area {
  flex-shrink: 0;
  text-align: center;
  padding: 8px 0;
  min-height: 44px;
}

.status {
  font-size: 14px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 16px;
  display: inline-block;
  transition: all 0.3s;
}

.status.idle { background: #ecf0f1; color: #7f8c8d; }
.status.recording { background: #fdecea; color: #e74c3c; }
.status.paused { background: #fef9e7; color: #f39c12; }
.status.uploading { background: #eaf2f8; color: #2980b9; }
.status.done { background: #eafaf1; color: #27ae60; }
.status.error { background: #fdecea; color: #c0392b; }
.status.confirm { background: #eaf2f8; color: #2980b9; }

.upload-progress {
  margin-top: 6px;
  width: 200px;
  height: 4px;
  background: #ecf0f1;
  border-radius: 2px;
  overflow: hidden;
  display: inline-block;
}

.upload-progress .bar {
  height: 100%;
  background: #3498db;
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #3498db;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 4px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ---- Confirm overlay ---- */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.confirm-panel {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 340px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  text-align: center;
}

.confirm-panel h2 {
  font-size: 18px;
  margin-bottom: 8px;
}

.confirm-panel p {
  font-size: 14px;
  color: #7f8c8d;
  margin-bottom: 20px;
}

.confirm-panel .btn-row {
  display: flex;
  gap: 10px;
}

.confirm-panel button {
  flex: 1;
  height: 44px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

.confirm-panel .btn-save {
  background: #27ae60;
  color: #fff;
}

.confirm-panel .btn-discard {
  background: #ecf0f1;
  color: #7f8c8d;
}

/* ---- History ---- */
.history-area {
  flex: 1;
  width: 100%;
  max-width: 400px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 0 20px;
}

.history-title {
  font-size: 13px;
  color: #95a5a6;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-left: 4px;
}

.history-list { list-style: none; }

.history-item {
  background: #fff;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
}

.history-item .icon-col {
  width: 36px;
  height: 36px;
  background: #eafaf1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.history-item .info { flex: 1; min-width: 0; }

.history-item .filename {
  font-size: 13px;
  font-weight: 600;
  color: #2c3e50;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.history-item .meta {
  font-size: 11px;
  color: #95a5a6;
  margin-top: 2px;
}

.empty-history {
  text-align: center;
  color: #bdc3c7;
  font-size: 13px;
  padding: 20px;
}

/* ---- Settings overlay ---- */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.settings-panel {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}

.settings-panel h2 {
  font-size: 18px;
  margin-bottom: 16px;
}

.settings-panel label {
  display: block;
  font-size: 13px;
  color: #7f8c8d;
  margin-bottom: 4px;
}

.settings-panel input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  -webkit-appearance: none;
}

.settings-panel .btn-row {
  display: flex;
  gap: 8px;
}

.settings-panel button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.settings-panel .btn-save {
  background: #3498db;
  color: #fff;
}

.settings-panel .btn-cancel {
  background: #ecf0f1;
  color: #7f8c8d;
}
</style>
</head>
<body>

<!-- ===== Background Pause Banner ===== -->
<div class="bg-pause-banner" id="bgPauseBanner">バックグラウンド移行のため録音を一時停止しました</div>

<!-- ===== Header ===== -->
<div class="header">
  <h1>振り返り録音</h1>
  <button class="settings-btn" id="btnSettings" aria-label="設定">&#9881;</button>
</div>
<div class="date-display" id="dateDisplay"></div>

<!-- ===== Waveform ===== -->
<div class="waveform-area">
  <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
</div>

<!-- ===== Time ===== -->
<div class="time-display" id="timeDisplay">
  <span class="current-time">00:00</span>
</div>

<!-- ===== Controls (swapped per state) ===== -->
<div class="controls" id="controls">
  <!-- Populated by JS based on state -->
</div>

<!-- ===== Status ===== -->
<div class="status-area">
  <div class="status idle" id="status">待機中</div>
  <div class="upload-progress hidden" id="uploadProgress"><div class="bar" id="uploadBar"></div></div>
</div>

<!-- ===== History ===== -->
<div class="history-area">
  <div class="history-title">録音履歴</div>
  <ul class="history-list" id="historyList">
    <li class="empty-history">まだ録音はありません</li>
  </ul>
</div>

<!-- ===== Confirm Save Overlay ===== -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-panel">
    <h2>録音を保存しますか？</h2>
    <p id="confirmInfo"></p>
    <div class="btn-row">
      <button class="btn-discard" id="btnDiscard">破棄</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- ===== Settings Overlay ===== -->
<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-panel">
    <h2>設定</h2>
    <label for="gasUrlInput">GAS WebアプリURL</label>
    <input type="url" id="gasUrlInput" placeholder="https://script.google.com/macros/s/...">
    <div class="btn-row">
      <button class="btn-cancel" id="btnSettingsCancel">キャンセル</button>
      <button class="btn-save" id="btnSettingsSave">保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Constants
// ============================================================

const DEFAULT_GAS_URL = "https://script.google.com/macros/s/AKfycbz6NFcJuQAWX6zXGVlGol3dbs7uq0ctuVgOIsEzUItbQZL-IQwAZLejJEfgKaEv9wIM/exec";
const CHUNK_SIZE = 30 * 1024 * 1024;
const HISTORY_KEY = "voice_recorder_history";
const MAX_HISTORY = 5;
const SAMPLE_RATE = 44100;

// ============================================================
// State
// ============================================================

// App state: idle | recording | paused | confirm | uploading | done
let appState = "idle";

// PCM audio buffer: Float32Array, accumulated from all recording segments
let pcmBuffer = null; // Float32Array or null

// MediaRecorder + stream
let mediaRecorder = null;
let mediaStream = null;
let recorderChunks = [];

// For real-time waveform during recording
let audioContext = null;
let analyserNode = null;
let sourceNode = null;

// Timer
let timerInterval = null;
let recordingStartTime = 0;
let accumulatedTimeMs = 0; // total recorded time in ms before current segment

// Paused state playback
let playbackSource = null; // AudioBufferSourceNode for playback
let playbackStartTime = 0; // audioContext.currentTime when playback started
let playbackOffset = 0; // offset in seconds where playback started
let isPlaying = false;

// Overwrite position (in samples)
let overwritePositionSamples = 0;

// Canvas animation
let animFrameId = null;

// Seek position during pause (in seconds)
let seekPositionSec = 0;

// Flag: is touch/mouse dragging the waveform
let isDraggingWaveform = false;

// ============================================================
// DOM refs
// ============================================================

const $canvas = document.getElementById("waveformCanvas");
const $timeDisplay = document.getElementById("timeDisplay");
const $controls = document.getElementById("controls");
const $status = document.getElementById("status");
const $dateDisplay = document.getElementById("dateDisplay");
const $confirmOverlay = document.getElementById("confirmOverlay");
const $confirmInfo = document.getElementById("confirmInfo");
const $uploadProgress = document.getElementById("uploadProgress");
const $uploadBar = document.getElementById("uploadBar");
const $settingsOverlay = document.getElementById("settingsOverlay");
const $historyList = document.getElementById("historyList");

// ============================================================
// Init
// ============================================================

document.addEventListener("DOMContentLoaded", () => {
  updateDateDisplay();
  loadHistory();
  resizeCanvas();
  renderState();
  setupEventListeners();
  generatePWAIcons();
});

window.addEventListener("resize", () => {
  resizeCanvas();
  if (appState === "paused") drawStaticWaveform();
});

function resizeCanvas() {
  const rect = $canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  $canvas.width = rect.width * dpr;
  $canvas.height = rect.height * dpr;
  const ctx = $canvas.getContext("2d");
  ctx.scale(dpr, dpr);
}

function setupEventListeners() {
  // Settings
  document.getElementById("btnSettings").addEventListener("click", openSettings);
  document.getElementById("btnSettingsCancel").addEventListener("click", closeSettings);
  document.getElementById("btnSettingsSave").addEventListener("click", saveSettings);
  $settingsOverlay.addEventListener("click", (e) => {
    if (e.target === $settingsOverlay) closeSettings();
  });

  // Confirm overlay
  document.getElementById("btnSave").addEventListener("click", doSave);
  document.getElementById("btnDiscard").addEventListener("click", doDiscard);
  $confirmOverlay.addEventListener("click", (e) => {
    if (e.target === $confirmOverlay) { /* do nothing, require explicit choice */ }
  });

  // Waveform touch/mouse for seeking (only active in paused state)
  $canvas.addEventListener("pointerdown", onWaveformPointerDown);
  $canvas.addEventListener("pointermove", onWaveformPointerMove);
  $canvas.addEventListener("pointerup", onWaveformPointerUp);
  $canvas.addEventListener("pointercancel", onWaveformPointerUp);

  // Visibilitychange: auto-pause when app goes to background (iOS protection)
  document.addEventListener("visibilitychange", onVisibilityChange);
}

// ============================================================
// Date display
// ============================================================

function updateDateDisplay() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const days = ["日", "月", "火", "水", "木", "金", "土"];
  $dateDisplay.textContent = `${y}年${m}月${d}日（${days[now.getDay()]}）`;
}

// ============================================================
// State rendering
// ============================================================

function renderState() {
  // Update controls
  renderControls();
  // Update status badge
  renderStatus();
  // Update time display
  renderTimeDisplay();
  // Update waveform
  if (appState === "idle" || appState === "done") {
    clearCanvas();
  }
}

function renderControls() {
  $controls.innerHTML = "";

  switch (appState) {
    case "idle":
    case "done": {
      const btn = el("button", { class: "btn-start-record", id: "btnStartRecord" });
      btn.innerHTML = "&#9210; タップして録音開始";
      btn.addEventListener("click", startRecording);
      $controls.appendChild(btn);
      break;
    }

    case "recording": {
      // Pause | Record(stop-shape) | Done
      const btnPause = el("button", { class: "btn-action btn-pause" });
      btnPause.textContent = "⏸ 一時停止";
      btnPause.addEventListener("click", pauseRecording);

      const btnRec = el("button", { class: "btn-record recording pulse", id: "btnRecordMain" });
      btnRec.innerHTML = '<div class="inner"></div>';
      // During recording, tapping the record button does nothing (pause is separate)
      btnRec.style.pointerEvents = "none";

      const btnDone = el("button", { class: "btn-action btn-done" });
      btnDone.textContent = "完了";
      btnDone.addEventListener("click", finishRecording);

      $controls.appendChild(btnPause);
      $controls.appendChild(btnRec);
      $controls.appendChild(btnDone);
      break;
    }

    case "paused": {
      // Play | Overwrite Record | Done
      const btnPlay = el("button", { class: "btn-action btn-play", id: "btnPlay" });
      btnPlay.textContent = isPlaying ? "⏸ 停止" : "▶ 再生";
      btnPlay.addEventListener("click", togglePlayback);

      const btnOverwrite = el("button", { class: "btn-action btn-overwrite" });
      btnOverwrite.textContent = "⏺ 上書き録音";
      btnOverwrite.addEventListener("click", startOverwriteRecording);

      const btnDone = el("button", { class: "btn-action btn-done" });
      btnDone.textContent = "完了";
      btnDone.addEventListener("click", finishRecording);

      // Retake (full width row)
      const btnRetake = el("button", { class: "btn-action btn-retake" });
      btnRetake.textContent = "最初から撮り直し";
      btnRetake.addEventListener("click", retakeRecording);

      $controls.appendChild(btnPlay);
      $controls.appendChild(btnOverwrite);
      $controls.appendChild(btnDone);
      $controls.appendChild(btnRetake);
      break;
    }

    case "confirm":
    case "uploading": {
      // No controls, overlay is showing
      break;
    }
  }
}

function renderStatus() {
  switch (appState) {
    case "idle":
      setStatusBadge("idle", "待機中");
      break;
    case "recording":
      setStatusBadge("recording", "録音中...");
      break;
    case "paused":
      setStatusBadge("paused", "一時停止中 — 波形タップでシーク");
      break;
    case "confirm":
      setStatusBadge("confirm", "保存を確認してください");
      break;
    case "uploading":
      setStatusBadge("uploading", '<span class="spinner"></span>アップロード中...');
      break;
    case "done":
      setStatusBadge("done", "保存しました");
      break;
  }
}

function renderTimeDisplay() {
  if (appState === "idle" || appState === "done") {
    $timeDisplay.innerHTML = '<span class="current-time">00:00</span>';
  } else if (appState === "recording") {
    // Updated by timer
  } else if (appState === "paused") {
    const total = pcmBuffer ? pcmBuffer.length / SAMPLE_RATE : 0;
    const cur = seekPositionSec;
    $timeDisplay.innerHTML =
      `<span class="current-time">${fmtTime(cur)}</span>` +
      ` <span class="total-time">/ ${fmtTime(total)}</span>`;
  }
}

function setStatusBadge(type, html) {
  $status.className = "status " + type;
  $status.innerHTML = html;
}

// ============================================================
// Recording: Start
// ============================================================

async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: true,
        sampleRate: SAMPLE_RATE,
      }
    });
  } catch (err) {
    if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
      setStatusBadge("error", "マイクの使用が許可されていません");
    } else {
      setStatusBadge("error", "マイクの取得に失敗: " + escapeHtml(err.message));
    }
    return;
  }

  // Reset state
  pcmBuffer = null;
  accumulatedTimeMs = 0;
  seekPositionSec = 0;
  overwritePositionSamples = 0;

  beginMediaRecorder(false);

  appState = "recording";
  renderState();
  startTimer();
  startRealtimeWaveform();
}

// ============================================================
// Recording: Pause
// ============================================================

async function pauseRecording() {
  if (appState !== "recording" || !mediaRecorder) return;

  stopTimer();
  stopRealtimeWaveform();

  // Calculate elapsed time for this segment
  const segmentMs = Date.now() - recordingStartTime;
  accumulatedTimeMs += segmentMs;

  // Stop MediaRecorder to get data
  const pcmSegment = await stopMediaRecorderAndDecode();

  // Merge into pcmBuffer
  if (pcmSegment) {
    if (pcmBuffer) {
      // If overwrite position is set, keep data up to that point, then append new
      const keepSamples = overwritePositionSamples;
      const newLen = keepSamples + pcmSegment.length;
      const merged = new Float32Array(newLen);
      merged.set(pcmBuffer.subarray(0, Math.min(keepSamples, pcmBuffer.length)));
      merged.set(pcmSegment, keepSamples);
      pcmBuffer = merged;
    } else {
      pcmBuffer = pcmSegment;
    }
  }

  // Update accumulated time from actual PCM length
  if (pcmBuffer) {
    accumulatedTimeMs = (pcmBuffer.length / SAMPLE_RATE) * 1000;
  }

  // Reset overwrite position to end
  overwritePositionSamples = pcmBuffer ? pcmBuffer.length : 0;
  seekPositionSec = pcmBuffer ? pcmBuffer.length / SAMPLE_RATE : 0;

  appState = "paused";
  renderState();
  drawStaticWaveform();
}

// ============================================================
// Recording: Resume (from end)
// ============================================================

function resumeRecording() {
  if (appState !== "paused") return;

  stopPlayback();

  // Set overwrite position to end of buffer
  overwritePositionSamples = pcmBuffer ? pcmBuffer.length : 0;

  beginMediaRecorder(false);

  appState = "recording";
  renderState();
  startTimer();
  startRealtimeWaveform();
}

// ============================================================
// Recording: Overwrite from seek position
// ============================================================

function startOverwriteRecording() {
  if (appState !== "paused") return;

  stopPlayback();

  // Set overwrite position to current seek position
  overwritePositionSamples = Math.round(seekPositionSec * SAMPLE_RATE);
  // Update accumulated time: only the portion being kept
  accumulatedTimeMs = (overwritePositionSamples / SAMPLE_RATE) * 1000;

  beginMediaRecorder(false);

  appState = "recording";
  renderState();
  startTimer();
  startRealtimeWaveform();
}

// ============================================================
// Recording: Finish (go to confirm)
// ============================================================

async function finishRecording() {
  if (appState === "recording") {
    // Need to stop recorder first
    stopTimer();
    stopRealtimeWaveform();

    const segmentMs = Date.now() - recordingStartTime;
    accumulatedTimeMs += segmentMs;

    const pcmSegment = await stopMediaRecorderAndDecode();

    if (pcmSegment) {
      if (pcmBuffer) {
        const keepSamples = overwritePositionSamples;
        const newLen = keepSamples + pcmSegment.length;
        const merged = new Float32Array(newLen);
        merged.set(pcmBuffer.subarray(0, Math.min(keepSamples, pcmBuffer.length)));
        merged.set(pcmSegment, keepSamples);
        pcmBuffer = merged;
      } else {
        pcmBuffer = pcmSegment;
      }
    }

    if (pcmBuffer) {
      accumulatedTimeMs = (pcmBuffer.length / SAMPLE_RATE) * 1000;
    }
  } else if (appState === "paused") {
    stopPlayback();
  }

  if (!pcmBuffer || pcmBuffer.length === 0) {
    setStatusBadge("error", "録音データが空です");
    resetToIdle();
    return;
  }

  // Show confirm overlay
  const totalSec = pcmBuffer.length / SAMPLE_RATE;
  $confirmInfo.textContent = `録音時間: ${fmtTime(totalSec)}`;
  $confirmOverlay.classList.remove("hidden");

  appState = "confirm";
  renderState();
}

// ============================================================
// Recording: Retake
// ============================================================

function retakeRecording() {
  stopPlayback();
  releaseStream();
  pcmBuffer = null;
  accumulatedTimeMs = 0;
  seekPositionSec = 0;
  overwritePositionSamples = 0;

  appState = "idle";
  renderState();
  setStatusBadge("idle", "録音を破棄しました");
  setTimeout(() => {
    if (appState === "idle") setStatusBadge("idle", "待機中");
  }, 2000);
}

// ============================================================
// Confirm: Save / Discard
// ============================================================

async function doSave() {
  $confirmOverlay.classList.add("hidden");

  if (!pcmBuffer || pcmBuffer.length === 0) {
    setStatusBadge("error", "録音データがありません");
    resetToIdle();
    return;
  }

  appState = "uploading";
  renderState();

  try {
    // Try compressed encoding first (M4A/WebM), fall back to WAV
    const fmt = getSupportedMimeType();
    let audioBlob;
    let uploadMimeType;
    let fileExt;

    if (fmt.mimeType) {
      // Encode PCM to compressed format via MediaRecorder
      setStatusBadge("uploading", '<span class="spinner"></span>音声を圧縮中...');
      audioBlob = await encodePCMToCompressed(pcmBuffer, SAMPLE_RATE, fmt.mimeType);
      uploadMimeType = fmt.mimeType.split(";")[0]; // "audio/mp4" or "audio/webm"
      fileExt = fmt.ext;
    } else {
      // Fallback to WAV
      audioBlob = encodeWAV(pcmBuffer, SAMPLE_RATE);
      uploadMimeType = "audio/wav";
      fileExt = "wav";
    }

    const filename = generateFilename(fileExt);
    const totalSec = Math.floor(pcmBuffer.length / SAMPLE_RATE);

    setStatusBadge("uploading", '<span class="spinner"></span>アップロード中...');
    const base64 = await blobToBase64(audioBlob);
    await uploadToGAS(filename, base64, uploadMimeType);

    addHistory(filename, audioBlob.size, totalSec);

    hideProgress();
    appState = "done";
    renderState();
    releaseStream();
    pcmBuffer = null;

    setTimeout(() => {
      if (appState === "done") {
        appState = "idle";
        renderState();
      }
    }, 3000);
  } catch (err) {
    hideProgress();
    setStatusBadge("error", "アップロード失敗: " + escapeHtml(err.message));
    // Fallback: offer WAV download
    const wavBlob = encodeWAV(pcmBuffer, SAMPLE_RATE);
    offerDownload(wavBlob, generateFilename("wav"));
    resetToIdle();
  }
}

function doDiscard() {
  $confirmOverlay.classList.add("hidden");
  releaseStream();
  pcmBuffer = null;
  accumulatedTimeMs = 0;
  resetToIdle();
  setStatusBadge("idle", "録音を破棄しました");
  setTimeout(() => {
    if (appState === "idle") setStatusBadge("idle", "待機中");
  }, 2000);
}

function resetToIdle() {
  appState = "idle";
  renderState();
}

// ============================================================
// MediaRecorder helpers
// ============================================================

function beginMediaRecorder(isOverwrite) {
  recorderChunks = [];

  const options = {};
  const fmt = getSupportedMimeType();
  if (fmt.mimeType) options.mimeType = fmt.mimeType;

  try {
    mediaRecorder = new MediaRecorder(mediaStream, options);
  } catch (e) {
    mediaRecorder = new MediaRecorder(mediaStream);
  }

  mediaRecorder._mimeType = mediaRecorder.mimeType || fmt.mimeType || "audio/mp4";

  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) {
      recorderChunks.push(e.data);
    }
  };

  // IMPORTANT: onstop does NOT trigger upload. It only resolves the promise.
  // Upload is ONLY done via explicit save button.
  mediaRecorder._stopResolve = null;
  mediaRecorder.onstop = () => {
    if (mediaRecorder._stopResolve) {
      mediaRecorder._stopResolve();
      mediaRecorder._stopResolve = null;
    }
  };

  mediaRecorder.start(500); // 500ms timeslice for finer granularity
  recordingStartTime = Date.now();
}

function stopMediaRecorderAndDecode() {
  return new Promise((resolve) => {
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
      resolve(null);
      return;
    }

    mediaRecorder._stopResolve = async () => {
      const mimeType = mediaRecorder._mimeType;
      if (recorderChunks.length === 0) {
        resolve(null);
        return;
      }
      const blob = new Blob(recorderChunks, { type: mimeType });
      recorderChunks = [];

      // Decode blob to PCM Float32Array
      try {
        const ctx = getAudioContext();
        const arrayBuf = await blob.arrayBuffer();
        const audioBuf = await ctx.decodeAudioData(arrayBuf);
        const channelData = audioBuf.getChannelData(0);

        // Resample if needed
        if (audioBuf.sampleRate !== SAMPLE_RATE) {
          const resampled = resampleBuffer(channelData, audioBuf.sampleRate, SAMPLE_RATE);
          resolve(resampled);
        } else {
          // Return a copy so we don't hold the AudioBuffer
          resolve(new Float32Array(channelData));
        }
      } catch (err) {
        console.error("Decode error:", err);
        resolve(null);
      }
    };

    mediaRecorder.stop();
  });
}

function resampleBuffer(inputData, fromRate, toRate) {
  const ratio = fromRate / toRate;
  const newLength = Math.round(inputData.length / ratio);
  const output = new Float32Array(newLength);
  for (let i = 0; i < newLength; i++) {
    const srcIndex = i * ratio;
    const low = Math.floor(srcIndex);
    const high = Math.min(low + 1, inputData.length - 1);
    const frac = srcIndex - low;
    output[i] = inputData[low] * (1 - frac) + inputData[high] * frac;
  }
  return output;
}

function getSupportedMimeType() {
  const candidates = [
    { mimeType: "audio/mp4", ext: "m4a" },
    { mimeType: "audio/aac", ext: "aac" },
    { mimeType: "audio/webm;codecs=opus", ext: "webm" },
    { mimeType: "audio/webm", ext: "webm" },
    { mimeType: "audio/ogg;codecs=opus", ext: "ogg" },
  ];
  for (const c of candidates) {
    try {
      if (MediaRecorder.isTypeSupported(c.mimeType)) return c;
    } catch (e) { /* ignore */ }
  }
  return { mimeType: "", ext: "m4a" };
}

function releaseStream() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  // Don't close AudioContext - reuse it
}

function getAudioContext() {
  if (!audioContext || audioContext.state === "closed") {
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  }
  if (audioContext.state === "suspended") {
    audioContext.resume();
  }
  return audioContext;
}

// ============================================================
// Timer
// ============================================================

function startTimer() {
  recordingStartTime = Date.now();
  updateTimerDisplay();
  timerInterval = setInterval(updateTimerDisplay, 200);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimerDisplay() {
  const elapsed = accumulatedTimeMs + (Date.now() - recordingStartTime);
  const totalSec = elapsed / 1000;
  $timeDisplay.innerHTML = `<span class="current-time">${fmtTime(totalSec)}</span>`;
}

// ============================================================
// Waveform: Realtime (during recording)
// ============================================================

function startRealtimeWaveform() {
  try {
    const ctx = getAudioContext();
    if (sourceNode) {
      try { sourceNode.disconnect(); } catch(e) {}
    }
    sourceNode = ctx.createMediaStreamSource(mediaStream);
    analyserNode = ctx.createAnalyser();
    analyserNode.fftSize = 256;
    sourceNode.connect(analyserNode);
    drawRealtimeWaveform();
  } catch (err) {
    console.error("Realtime waveform error:", err);
  }
}

function stopRealtimeWaveform() {
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
  if (sourceNode) {
    try { sourceNode.disconnect(); } catch(e) {}
    sourceNode = null;
  }
  analyserNode = null;
}

function drawRealtimeWaveform() {
  if (!analyserNode) return;

  const canvas = $canvas;
  const ctx = canvas.getContext("2d");
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;

  const bufferLength = analyserNode.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw() {
    if (appState !== "recording") return;

    analyserNode.getByteTimeDomainData(dataArray);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, w, h);

    // Draw waveform
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#e74c3c";
    ctx.beginPath();

    const sliceWidth = w / bufferLength;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
      const v = dataArray[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      x += sliceWidth;
    }

    ctx.lineTo(w, h / 2);
    ctx.stroke();

    // Draw center line
    ctx.strokeStyle = "rgba(231, 76, 60, 0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    animFrameId = requestAnimationFrame(draw);
  }

  draw();
}

// ============================================================
// Waveform: Static (during paused state)
// ============================================================

function drawStaticWaveform() {
  if (!pcmBuffer || pcmBuffer.length === 0) {
    clearCanvas();
    return;
  }

  const canvas = $canvas;
  const ctx = canvas.getContext("2d");
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, h);

  // Draw waveform from PCM data
  const data = pcmBuffer;
  const samplesPerPixel = Math.max(1, Math.floor(data.length / w));

  ctx.strokeStyle = "#3498db";
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let i = 0; i < w; i++) {
    let min = 1, max = -1;
    const startSample = Math.floor(i * data.length / w);
    const endSample = Math.min(startSample + samplesPerPixel, data.length);
    for (let j = startSample; j < endSample; j++) {
      const val = data[j];
      if (val < min) min = val;
      if (val > max) max = val;
    }
    const yMin = ((1 + min) / 2) * h;
    const yMax = ((1 + max) / 2) * h;
    ctx.moveTo(i, yMin);
    ctx.lineTo(i, yMax);
  }

  ctx.stroke();

  // Center line
  ctx.strokeStyle = "rgba(52, 152, 219, 0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  // Draw seek position line (red vertical line)
  const totalDuration = data.length / SAMPLE_RATE;
  if (totalDuration > 0) {
    const xPos = (seekPositionSec / totalDuration) * w;
    ctx.strokeStyle = "#e74c3c";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(xPos, 0);
    ctx.lineTo(xPos, h);
    ctx.stroke();

    // Small circle at the position
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath();
    ctx.arc(xPos, h / 2, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function clearCanvas() {
  const ctx = $canvas.getContext("2d");
  const w = $canvas.getBoundingClientRect().width;
  const h = $canvas.getBoundingClientRect().height;
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, h);

  // Draw center line placeholder
  ctx.strokeStyle = "rgba(0,0,0,0.06)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();
}

// ============================================================
// Waveform: Seek via touch/pointer
// ============================================================

function onWaveformPointerDown(e) {
  if (appState !== "paused") return;
  isDraggingWaveform = true;
  $canvas.setPointerCapture(e.pointerId);
  updateSeekFromPointer(e);
}

function onWaveformPointerMove(e) {
  if (!isDraggingWaveform || appState !== "paused") return;
  updateSeekFromPointer(e);
}

function onWaveformPointerUp(e) {
  if (!isDraggingWaveform) return;
  isDraggingWaveform = false;
  // If playing, seek the playback
  if (isPlaying) {
    stopPlayback();
    startPlaybackFromPosition(seekPositionSec);
  }
}

function updateSeekFromPointer(e) {
  if (!pcmBuffer || pcmBuffer.length === 0) return;
  const rect = $canvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
  const ratio = x / rect.width;
  const totalDuration = pcmBuffer.length / SAMPLE_RATE;
  seekPositionSec = ratio * totalDuration;
  drawStaticWaveform();
  renderTimeDisplay();
}

// ============================================================
// Playback (during paused state)
// ============================================================

function togglePlayback() {
  if (isPlaying) {
    stopPlayback();
    renderControls();
  } else {
    startPlaybackFromPosition(seekPositionSec);
    renderControls();
  }
}

function startPlaybackFromPosition(offsetSec) {
  if (!pcmBuffer || pcmBuffer.length === 0) return;

  const ctx = getAudioContext();
  const audioBuf = ctx.createBuffer(1, pcmBuffer.length, SAMPLE_RATE);
  audioBuf.getChannelData(0).set(pcmBuffer);

  playbackSource = ctx.createBufferSource();
  playbackSource.buffer = audioBuf;
  playbackSource.connect(ctx.destination);

  playbackOffset = offsetSec;
  playbackStartTime = ctx.currentTime;

  playbackSource.onended = () => {
    if (isPlaying) {
      isPlaying = false;
      seekPositionSec = pcmBuffer.length / SAMPLE_RATE;
      if (animFrameId) {
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
      }
      drawStaticWaveform();
      renderTimeDisplay();
      renderControls();
    }
  };

  playbackSource.start(0, offsetSec);
  isPlaying = true;

  // Animate the seek line
  function animatePlayback() {
    if (!isPlaying) return;
    const elapsed = ctx.currentTime - playbackStartTime;
    seekPositionSec = playbackOffset + elapsed;
    const totalDuration = pcmBuffer.length / SAMPLE_RATE;
    if (seekPositionSec >= totalDuration) {
      seekPositionSec = totalDuration;
    }
    drawStaticWaveform();
    renderTimeDisplay();
    animFrameId = requestAnimationFrame(animatePlayback);
  }
  animatePlayback();
}

function stopPlayback() {
  if (playbackSource) {
    try { playbackSource.stop(); } catch(e) {}
    playbackSource = null;
  }
  isPlaying = false;
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
}

// ============================================================
// WAV Encoder
// ============================================================

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);

  function writeStr(offset, str) {
    for (let i = 0; i < str.length; i++) {
      view.setUint8(offset + i, str.charCodeAt(i));
    }
  }

  // RIFF header
  writeStr(0, "RIFF");
  view.setUint32(4, 36 + samples.length * 2, true);
  writeStr(8, "WAVE");

  // fmt chunk
  writeStr(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, 1, true); // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); // byte rate
  view.setUint16(32, 2, true); // block align
  view.setUint16(34, 16, true); // bits per sample

  // data chunk
  writeStr(36, "data");
  view.setUint32(40, samples.length * 2, true);

  // PCM samples: float32 -> int16
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  return new Blob([buffer], { type: "audio/wav" });
}

// ============================================================
// Compressed Encoder (PCM -> M4A/WebM via MediaRecorder)
// ============================================================

function encodePCMToCompressed(samples, sampleRate, mimeType) {
  return new Promise((resolve, reject) => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: sampleRate });
      const audioBuf = ctx.createBuffer(1, samples.length, sampleRate);
      audioBuf.getChannelData(0).set(samples);

      const source = ctx.createBufferSource();
      source.buffer = audioBuf;

      const dest = ctx.createMediaStreamDestination();
      source.connect(dest);

      const chunks = [];
      let recorder;
      try {
        recorder = new MediaRecorder(dest.stream, { mimeType: mimeType });
      } catch (e) {
        // If the mimeType fails, try without options
        recorder = new MediaRecorder(dest.stream);
      }

      recorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) chunks.push(e.data);
      };

      recorder.onstop = () => {
        ctx.close().catch(() => {});
        if (chunks.length === 0) {
          reject(new Error("圧縮エンコードに失敗: データなし"));
          return;
        }
        const blob = new Blob(chunks, { type: recorder.mimeType || mimeType });
        resolve(blob);
      };

      recorder.onerror = (e) => {
        ctx.close().catch(() => {});
        reject(new Error("圧縮エンコードエラー: " + (e.error?.message || "不明")));
      };

      recorder.start();
      source.start(0);

      // Stop recording when the source finishes playing
      source.onended = () => {
        // Small delay to ensure all data is captured
        setTimeout(() => {
          if (recorder.state !== "inactive") {
            recorder.stop();
          }
        }, 100);
      };

      // Safety timeout: if source.onended doesn't fire
      const maxDurationMs = (samples.length / sampleRate) * 1000 + 2000;
      setTimeout(() => {
        if (recorder.state !== "inactive") {
          recorder.stop();
        }
      }, maxDurationMs);
    } catch (err) {
      reject(err);
    }
  });
}

// ============================================================
// Upload to GAS
// ============================================================

function getGasUrl() {
  return localStorage.getItem("gas_webapp_url") || DEFAULT_GAS_URL;
}

function generateFilename(ext) {
  ext = ext || "m4a";
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const h = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  return `${y}-${mo}-${d}_${h}${mi}_振り返り.${ext}`;
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(",")[1];
      resolve(base64);
    };
    reader.onerror = () => reject(new Error("Base64変換に失敗"));
    reader.readAsDataURL(blob);
  });
}

async function uploadToGAS(filename, base64data, mimeType) {
  const gasUrl = getGasUrl();

  if (!gasUrl || gasUrl === "PASTE_YOUR_GAS_WEBAPP_URL_HERE") {
    throw new Error("GAS URLが設定されていません。設定画面からURLを入力してください。");
  }

  showProgress(0);

  const dataLength = base64data.length;

  if (dataLength <= CHUNK_SIZE) {
    showProgress(30);

    const response = await fetch(gasUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        filename: filename,
        data: base64data,
        mimeType: mimeType,
      }),
    });

    showProgress(90);

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const text = await response.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      throw new Error("レスポンスの解析に失敗: " + text.substring(0, 100));
    }

    showProgress(100);

    if (!result.success) throw new Error(result.error || "不明なエラー");
    return result;
  } else {
    // Chunked upload
    const sessionId = Date.now().toString(36) + Math.random().toString(36).substring(2);
    const totalChunks = Math.ceil(dataLength / CHUNK_SIZE);

    for (let i = 0; i < totalChunks; i++) {
      const chunk = base64data.substring(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
      const progress = Math.round(((i + 1) / totalChunks) * 90);
      showProgress(progress);

      const response = await fetch(gasUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          filename: filename,
          data: chunk,
          mimeType: mimeType,
          chunkIndex: i,
          totalChunks: totalChunks,
          sessionId: sessionId,
        }),
      });

      if (!response.ok) throw new Error(`チャンク${i + 1}送信失敗: HTTP ${response.status}`);

      const chunkText = await response.text();
      const result = JSON.parse(chunkText);
      if (!result.success) throw new Error(result.error || `チャンク${i + 1}でエラー`);
    }

    showProgress(100);
    return { success: true };
  }
}

function showProgress(percent) {
  $uploadProgress.classList.remove("hidden");
  $uploadBar.style.width = percent + "%";
}

function hideProgress() {
  $uploadProgress.classList.add("hidden");
  $uploadBar.style.width = "0%";
}

function offerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.textContent = "ここをタップして録音をダウンロード";
  a.style.cssText = "display:block;text-align:center;color:#3498db;font-weight:600;padding:12px;";
  document.querySelector(".status-area").appendChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

// ============================================================
// History (LocalStorage)
// ============================================================

function loadHistory() {
  renderHistory(getHistoryList());
}

function getHistoryList() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch { return []; }
}

function addHistory(filename, sizeBytes, durationSec) {
  const list = getHistoryList();
  list.unshift({
    filename,
    size: sizeBytes,
    duration: durationSec,
    timestamp: new Date().toISOString(),
  });
  while (list.length > MAX_HISTORY) list.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  renderHistory(list);
}

function renderHistory(list) {
  if (list.length === 0) {
    $historyList.innerHTML = '<li class="empty-history">まだ録音はありません</li>';
    return;
  }

  $historyList.innerHTML = list.map(item => {
    const sizeMB = (item.size / (1024 * 1024)).toFixed(1);
    const min = Math.floor(item.duration / 60);
    const sec = item.duration % 60;
    const durStr = `${min}分${sec}秒`;
    const dateStr = new Date(item.timestamp).toLocaleString("ja-JP", {
      month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
    });
    return `
      <li class="history-item">
        <div class="icon-col">&#9989;</div>
        <div class="info">
          <div class="filename">${escapeHtml(item.filename)}</div>
          <div class="meta">${dateStr} / ${durStr} / ${sizeMB}MB</div>
        </div>
      </li>`;
  }).join("");
}

// ============================================================
// Settings
// ============================================================

function openSettings() {
  document.getElementById("gasUrlInput").value = getGasUrl();
  $settingsOverlay.classList.remove("hidden");
}

function closeSettings() {
  $settingsOverlay.classList.add("hidden");
}

function saveSettings() {
  const url = document.getElementById("gasUrlInput").value.trim();
  if (url) localStorage.setItem("gas_webapp_url", url);
  closeSettings();
  setStatusBadge("idle", "設定を保存しました");
  setTimeout(() => {
    if (appState === "idle") setStatusBadge("idle", "待機中");
  }, 1500);
}

// ============================================================
// Utilities
// ============================================================

function fmtTime(sec) {
  if (!isFinite(sec) || sec < 0) sec = 0;
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function el(tag, attrs) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") e.className = v;
      else e.setAttribute(k, v);
    }
  }
  return e;
}

// ============================================================
// Visibilitychange: Background/Foreground handling
// ============================================================

let pausedByBackground = false;

function onVisibilityChange() {
  if (document.visibilityState === "hidden") {
    // Going to background
    if (appState === "recording") {
      // Auto-pause to protect recording data
      pausedByBackground = true;
      pauseRecording();
    }
  } else if (document.visibilityState === "visible") {
    // Returning to foreground
    if (pausedByBackground) {
      pausedByBackground = false;
      showBackgroundPauseBanner();
    }
  }
}

function showBackgroundPauseBanner() {
  const banner = document.getElementById("bgPauseBanner");
  banner.classList.add("show");
  setTimeout(() => {
    banner.classList.remove("show");
  }, 4000);
}

// ============================================================
// PWA Icons: Generate PNG from Canvas (iOS doesn't support SVG icons)
// ============================================================

function generatePWAIcons() {
  const sizes = [192, 512];
  const icons = [];

  for (const size of sizes) {
    const dataUrl = renderIconPNG(size);
    icons.push({
      src: dataUrl,
      sizes: `${size}x${size}`,
      type: "image/png",
    });
  }

  // Build manifest JSON
  const manifest = {
    name: "振り返り録音",
    short_name: "録音",
    description: "授業振り返り音声をGoogle Driveに自動保存",
    start_url: ".",
    display: "standalone",
    background_color: "#f5f7fa",
    theme_color: "#e74c3c",
    orientation: "portrait",
    icons: icons,
  };

  // Set manifest via data URI
  const manifestJson = JSON.stringify(manifest);
  const manifestBlob = new Blob([manifestJson], { type: "application/json" });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  document.getElementById("manifestLink").href = manifestUrl;

  // Set apple-touch-icon (180x180 PNG)
  const applePng = renderIconPNG(180);
  document.getElementById("appleTouchIcon").href = applePng;
}

function renderIconPNG(size) {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Red rounded rectangle background
  const radius = size * 0.2;
  ctx.fillStyle = "#e74c3c";
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();
  ctx.fill();

  // Microphone icon (simple stylized shape)
  const cx = size / 2;
  const cy = size / 2;
  const s = size / 192; // scale factor based on 192px base

  ctx.fillStyle = "#ffffff";
  ctx.strokeStyle = "#ffffff";

  // Mic body (rounded rect)
  const micW = 36 * s;
  const micH = 56 * s;
  const micR = 18 * s;
  const micTop = cy - 40 * s;
  ctx.beginPath();
  ctx.moveTo(cx - micW / 2 + micR, micTop);
  ctx.lineTo(cx + micW / 2 - micR, micTop);
  ctx.quadraticCurveTo(cx + micW / 2, micTop, cx + micW / 2, micTop + micR);
  ctx.lineTo(cx + micW / 2, micTop + micH - micR);
  ctx.quadraticCurveTo(cx + micW / 2, micTop + micH, cx + micW / 2 - micR, micTop + micH);
  ctx.lineTo(cx - micW / 2 + micR, micTop + micH);
  ctx.quadraticCurveTo(cx - micW / 2, micTop + micH, cx - micW / 2, micTop + micH - micR);
  ctx.lineTo(cx - micW / 2, micTop + micR);
  ctx.quadraticCurveTo(cx - micW / 2, micTop, cx - micW / 2 + micR, micTop);
  ctx.closePath();
  ctx.fill();

  // Mic holder arc
  const arcR = 30 * s;
  const arcY = cy - 4 * s;
  ctx.lineWidth = 5 * s;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.arc(cx, arcY, arcR, 0, Math.PI, false);
  ctx.stroke();

  // Stand line
  const standTop = arcY + arcR;
  const standBottom = standTop + 20 * s;
  ctx.beginPath();
  ctx.moveTo(cx, standTop);
  ctx.lineTo(cx, standBottom);
  ctx.stroke();

  // Base line
  const baseW = 28 * s;
  ctx.beginPath();
  ctx.moveTo(cx - baseW / 2, standBottom);
  ctx.lineTo(cx + baseW / 2, standBottom);
  ctx.stroke();

  return canvas.toDataURL("image/png");
}
